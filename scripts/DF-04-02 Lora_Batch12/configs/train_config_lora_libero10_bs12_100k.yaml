# DF-04-02 LoRA Batch12 full-training configuration.
#
# The project wrapper reads this YAML and passes every supported runtime value
# to scripts/finetune.py through explicit command-line arguments.
#
# Relative paths are resolved from the DF-04-02 LoRA Batch12 bundle root.

run:
  task_id: "DF-04-02"
  run_id: "df_04_02_lora_libero10_seed42_rank32_bs12_100k"
  branch_name: "DF-04-02"
  random_seed: 42
  mode: "full_train"

paths:
  official_openvla_root: "src"
  official_finetune_py: "scripts/finetune.py"
  dataset_root: "/root/autodl-tmp/datasets/openvla_modified_libero_rlds"
  split_json: "inputs/splits/libero_10_episode_split_seed42.json"

  output_dir: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k"
  log_path: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/df_04_02_lora_training.md"
  summary_csv: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/df_04_02_lora_summary.csv"
  metadata_json: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/df_04_02_lora_metadata.json"
  launch_resolved_config_yaml: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/launch_resolved_config.yaml"
  runtime_resolved_config_json: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/runtime_resolved_config.json"
  training_summary_json: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/training_summary.json"
  validation_history_jsonl: "outputs/adapters/df_04_02_lora_libero10_seed42_rank32_bs12_100k/validation_history.jsonl"

model:
  hub_id: "openvla/openvla-7b"
  local_path: "/root/autodl-tmp/hf_cache/hub/models--openvla--openvla-7b/snapshots/47a0ec7fc4ec123775a391911046cf33cf9ed83f"
  torch_dtype: "bfloat16"
  device: "cuda"
  local_files_only: true

dataset:
  hf_dataset_name: "openvla/modified_libero_rlds"
  mixture_name: "libero_10_no_noops"
  split_scope: "single_sub_dataset"
  source_split: "train"
  train_split_name: "train"
  val_split_name: "val"
  test_split_name: "test"
  expected_train_episodes: 330
  expected_val_episodes: 10
  expected_test_episodes: 39
  split_seed: 42

normalization:
  stats_json: "inputs/model_config/dataset_statistics_libero_10_train_seed42.json"
  stats_source: "train_only"
  required_dataset_keys:
    - "libero_10_no_noops"
  allow_pipeline_debug_stats: false

lora:
  use_lora: true
  rank: 32
  alpha: 16
  dropout: 0.0
  target_modules: "all-linear"
  init_lora_weights: "gaussian"

input:
  num_images_in_input: 2
  use_wrist_image: true
  use_proprio: true

training:
  objective: "token_cross_entropy"
  use_l1_regression: false
  use_action_head: false
  use_diffusion: false
  use_film: false
  batch_size: 12
  max_steps: 100000
  learning_rate: 0.0005
  lr_warmup_steps: 0
  num_steps_before_decay: 100000
  grad_accumulation_steps: 1
  image_aug: true
  shuffle_buffer_size: 100000
  use_quantization: false
  validate_finite_values: false
  world_size: 1

validation:
  start_step: 10000
  interval_steps: 10000
  max_batches: null
  time_limit_seconds: 420
  best_model_start_step: 10000
  overfit_patience: 3
  overfit_min_delta: 0.0

checkpointing:
  resume_checkpoint_steps: []

  # 0 means resumable checkpoints are not automatically pruned.
  save_total_limit: 0
  resume_from_checkpoint: null

logging:
  # This controls training-console output only.
  console_log_interval_steps: 500
  wandb_project: "openvla_efficiency"

  required_fields:
    - "task_id"
    - "run_id"
    - "branch_name"
    - "random_seed"
    - "git_commit_hash"
    - "command"
    - "launch_resolved_config_yaml"
    - "runtime_resolved_config_json"
    - "status"
    - "failure_reason"
    - "training_time_hours"
    - "total_training_steps"
    - "final_train_loss"
    - "final_train_action_token_accuracy"
    - "best_val_loss"
    - "best_val_action_token_accuracy"
    - "best_checkpoint_step"
    - "gradient_norm"
    - "train_loss_curve"
    - "val_loss_curve"
    - "train_action_token_accuracy_curve"
    - "val_action_token_accuracy_curve"
    - "learning_rate_curve"
    - "gradient_norm_curve"
    - "per_device_batch_size"
    - "world_size"
    - "grad_accumulation_steps"
    - "effective_global_batch_size"
    - "learning_rate"
    - "optimizer"
    - "scheduler"
    - "max_steps"
    - "trainable_params"
    - "total_params"
    - "actual_lora_rank"
    - "actual_lora_alpha"
    - "actual_lora_dropout"
    - "actual_target_modules"
    - "actual_init_lora_weights"
    - "actual_model_loaded_from"
    - "actual_local_files_only"
    - "torch_dtype"
    - "device"
    - "gpu_info"
    - "normalization_stats_json"
    - "normalization_stats_sha256"
    - "normalization_stats_source"
    - "episode_split_json"
    - "episode_split_sha256"
    - "split_seed"
    - "train_count"
    - "val_count"
    - "test_count"
    - "training_objective"
    - "use_l1_regression"
    - "use_action_head"
    - "num_images_in_input"
    - "use_wrist_image"
    - "use_proprio"
    - "validation_start_step"
    - "validation_interval_steps"
    - "validation_max_batches"
    - "validation_time_limit_seconds"
    - "best_model_start_step"
    - "validation_history"
    - "overfitting"
    - "best_adapter_path"
    - "final_adapter_path"
    - "resume_checkpoints"
    - "training_peak_vram_allocated_gb"
    - "training_peak_vram_reserved_gb"

notes:
  yaml_reader: "The project wrapper reads this YAML."
  trainer_interface: "The wrapper passes supported values to finetune.py as explicit CLI arguments."
  local_model_policy: "Training must use the already-downloaded local Hugging Face snapshot."
  split_policy: "Use only libero_10_no_noops with the existing fixed seed-42 episode indices: train=330, val=10, test=39."
  validation_schedule: "Start at step 10000, repeat every 10000 optimization steps, attempt a complete pass over the fixed 10-episode LIBERO-10 validation set, and stop after 420 seconds if necessary."
  normalization_policy: "Use the LIBERO-10 train-only action statistics computed from the fixed 330 training episodes."
  checkpoint_policy: "Resumable checkpoint steps remain empty until explicitly approved."
  runtime_truth_policy: "Actual model, LoRA, parameter-count, validation, and memory fields must be read from runtime objects or produced runtime files rather than copied from requested YAML values."
  training_objective_policy: "This run is LoRA-OneStepCE: one-step action-token prediction with token cross-entropy, no OFT action head, and no L1 continuous-action regression."
  rollout_policy: "The trained adapter should be evaluated through the original OpenVLA action-token parsing path for LIBERO simulation rollout."
