# Notes:
# The following paths are local paths on the author's cloud machine.
# They are recorded for experiment reproducibility and do not contain access credentials.

# This config belongs to DF-03-02.
# It defines how the LIBERO RLDS dataset inspection should be run.
task_id: "DF-03-02"
task_name: "LIBERO dataset inspection and sample loader preparation"

# This section records the main dataset used in this task.
# The dataset root points to the downloaded OpenVLA modified LIBERO RLDS dataset on the cloud data disk.
dataset:
  dataset_name: "openvla/modified_libero_rlds"
  dataset_root: "/root/autodl-tmp/datasets/openvla_modified_libero_rlds"

  # The current downloaded dataset only confirmed the train split.
  # Later tasks should use a fixed train subset with seed 42 for fair comparison.
  split: "train"
  random_seed: 42

# This section lists the four confirmed LIBERO sub-datasets.
# Each path points to a TFDS-style version folder that contains dataset_info.json and TFRecord shards.
sub_datasets:
  # This sub-dataset contains LIBERO-10 tasks without no-op actions.
  - name: "libero_10_no_noops"
    path: "/root/autodl-tmp/datasets/openvla_modified_libero_rlds/libero_10_no_noops/1.0.0"

  # This sub-dataset contains LIBERO goal-based tasks without no-op actions.
  - name: "libero_goal_no_noops"
    path: "/root/autodl-tmp/datasets/openvla_modified_libero_rlds/libero_goal_no_noops/1.0.0"

  # This sub-dataset contains LIBERO object-based tasks without no-op actions.
  - name: "libero_object_no_noops"
    path: "/root/autodl-tmp/datasets/openvla_modified_libero_rlds/libero_object_no_noops/1.0.0"

  # This sub-dataset contains LIBERO spatial tasks without no-op actions.
  - name: "libero_spatial_no_noops"
    path: "/root/autodl-tmp/datasets/openvla_modified_libero_rlds/libero_spatial_no_noops/1.0.0"

# This section controls what the inspection script should check.
# The task only inspects dataset structure and does not run OpenVLA inference.
inspection:
  # The script reads one episode from each sub-dataset to confirm the real field structure.
  read_first_episode: true

  # Only one episode is previewed per sub-dataset to keep the check fast and lightweight.
  max_episodes_to_preview_per_dataset: 1

  # The script records feature keys such as steps, observation, action, and language fields.
  record_feature_keys: true

  # The script records image shape so the later OpenVLA input converter can be designed correctly.
  record_image_shape: true

  # The script records action shape so later action parsing and comparison logic can be defined.
  record_action_shape: true

  # The script records the language field candidate so the later baseline runner can build prompts correctly.
  record_language_field: true

# This section defines the lightweight output files generated by the inspection script.
# These files are safe to commit because they contain metadata and summaries, not the full dataset.
outputs:
  markdown_log: "logs/df_03_02_libero_dataset_inspection_log.md"
  csv_summary: "results/tables/df_03_02_libero_dataset_summary.csv"

# This section records task-level notes for future readers of the project.
# It explains the boundary of DF-03-02 and prevents it from being confused with baseline evaluation.
notes:
  - "The cloud paths above are local paths on the author's cloud machine and do not contain access credentials."
  - "This task only inspects the dataset structure."
  - "It does not run OpenVLA baseline inference yet."
  - "The formal baseline evaluation starts after the dataset fields are confirmed."